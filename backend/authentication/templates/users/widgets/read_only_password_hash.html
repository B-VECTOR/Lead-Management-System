{% comment %}
Button-only variant of Django's ReadOnlyPasswordHashWidget: shows just the
"Reset password" button, omitting the password-hash summary (algorithm,
iterations, salt, hash). Used by users.forms.UserChangeForm.
{% endcomment %}
<div{% include 'django/forms/widgets/attrs.html' %}>
  <p><a class="button" href="{{ password_url|default:"../password/" }}">{{ button_label }}</a></p>
</div>
